{% extends 'base.html' %}
{% block content %}
<section class="card narrow">
    <h2>Role-based Login</h2>
    <p>Sample credentials: village_rep_1 / district_admin_a / state_admin with password123</p>

    </form>
</section>
{% endblock %}
